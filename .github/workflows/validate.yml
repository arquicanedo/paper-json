name: validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Validate genesis paper.json against paper.typ
        run: uv run validator.py paper.json --against paper.typ

      - name: Verify validator.py is in sync with schema.json
        run: |
          uv run generate_validator.py schema.json --out /tmp/regen_validator.py
          diff <(tr -d '\r' < /tmp/regen_validator.py) <(tr -d '\r' < validator.py)

      - name: Validate downstream corpus paper.json files
        run: |
          set -e
          for f in corpus/*/paper.json; do
            echo "::group::$f"
            uv run validator.py "$f"
            echo "::endgroup::"
          done
